<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — NusantaraEats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --gold: #D4AF37; --gold-dark: #8B6914; --gold-light: #FCD34D;
      --bg: #0A0A0A; --surface: #1A1A1A; --surface2: #242424;
      --text: #F0ECE6; --muted: #6B6560; --danger: #ef4444; --success: #22c55e;
    }
    body {
      font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 3px; }

    /* LOGIN */
    #loginScreen {
      width: 100%; max-width: 400px; padding: 40px; text-align: center;
    }
    #loginScreen h1 {
      font-family: 'Playfair Display', serif; font-size: 32px; margin-bottom: 4px;
    }
    #loginScreen h1 span { color: var(--gold); font-style: italic; }
    #loginScreen p { color: var(--muted); font-size: 13px; margin-bottom: 32px; }
    #loginScreen input {
      width: 100%; padding: 14px 16px; margin-bottom: 12px;
      background: var(--surface); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 4px; color: var(--text); font-size: 14px; outline: none;
    }
    #loginScreen input:focus { border-color: var(--gold); }
    #loginScreen button {
      width: 100%; padding: 14px; background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      border: none; border-radius: 4px; color: #000; font-weight: 700; font-size: 14px;
      cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
    }
    #loginScreen button:hover { opacity: 0.9; }
    #loginError { color: var(--danger); font-size: 13px; margin-top: 12px; display: none; }

    /* DASHBOARD */
    #dashboard { display: none; width: 100%; min-height: 100vh; }
    .dash-header {
      background: var(--surface); border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 16px 24px; display: flex; justify-content: space-between; align-items: center;
    }
    .dash-header h2 { font-size: 18px; }
    .dash-header h2 span { color: var(--gold); }
    .dash-header .user { font-size: 12px; color: var(--muted); }
    .dash-header .logout {
      background: none; border: 1px solid rgba(255,255,255,0.1); color: var(--muted);
      padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 12px;
    }
    .dash-header .logout:hover { border-color: var(--danger); color: var(--danger); }

    .dash-body { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

    /* Stats */
    .stats { display: flex; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; }
    .stat-card {
      background: var(--surface); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px; padding: 20px 28px; flex: 1; min-width: 140px;
    }
    .stat-card .num { font-size: 28px; font-weight: 700; color: var(--gold); }
    .stat-card .label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

    /* Tabs */
    .tabs { display: flex; gap: 0; margin-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .tab {
      padding: 12px 24px; cursor: pointer; font-size: 13px; font-weight: 500;
      color: var(--muted); border-bottom: 2px solid transparent; transition: all 0.2s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Form */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
      color: var(--muted); margin-bottom: 6px; font-weight: 600;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 12px 14px; background: var(--surface);
      border: 1px solid rgba(255,255,255,0.08); border-radius: 4px;
      color: var(--text); font-size: 14px; font-family: 'Inter', sans-serif; outline: none;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--gold);
    }
    .form-group textarea { resize: vertical; min-height: 100px; }
    .form-group.full { grid-column: 1 / -1; }
    .btn-submit {
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      border: none; padding: 14px 32px; border-radius: 4px; color: #000;
      font-weight: 700; font-size: 14px; cursor: pointer; text-transform: uppercase;
      letter-spacing: 1px; width: 100%;
    }
    .btn-submit:hover { opacity: 0.9; }

    /* Recipe List */
    .recipe-table { width: 100%; border-collapse: collapse; }
    .recipe-table th {
      text-align: left; padding: 12px 16px; font-size: 11px; text-transform: uppercase;
      letter-spacing: 1px; color: var(--muted); border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .recipe-table td {
      padding: 12px 16px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.04);
      vertical-align: middle;
    }
    .recipe-table tr:hover td { background: var(--surface); }
    .recipe-table .del-btn {
      background: none; border: 1px solid rgba(239,68,68,0.3); color: var(--danger);
      padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 11px;
    }
    .recipe-table .del-btn:hover { background: rgba(239,68,68,0.1); }

    /* Export/Import buttons */
    .data-actions { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .data-btn {
      padding: 10px 20px; border-radius: 4px; font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; border: none;
    }
    .data-btn.export { background: var(--surface2); color: var(--gold); border: 1px solid rgba(212,175,55,0.3); }
    .data-btn.import { background: var(--surface2); color: var(--text); border: 1px solid rgba(255,255,255,0.1); }
    .data-btn.import:hover { border-color: var(--gold); }
    .data-btn.export:hover { background: var(--gold); color: #000; }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--gold); color: #000; padding: 12px 24px; border-radius: 4px;
      font-weight: 600; font-size: 13px; opacity: 0; transition: all 0.3s; pointer-events: none;
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Preview image in table */
    .preview-img { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; }

    @media (max-width: 768px) {
      .form-grid { grid-template-columns: 1fr; }
      .recipe-table { font-size: 12px; }
      .recipe-table th, .recipe-table td { padding: 8px 10px; }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="loginScreen">
    <h1>Nusantara<span>Eats</span></h1>
    <p>Panel Admin — Kelola Resep</p>
    <input type="text" id="username" placeholder="Username" autocomplete="off">
    <input type="password" id="password" placeholder="Password">
    <button onclick="handleLogin()">Masuk</button>
    <div id="loginError">Username atau password salah</div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">
    <div class="dash-header">
      <div>
        <h2>Nusantara<span>Eats</span> Admin</h2>
        <div class="user" id="userDisplay">samir</div>
      </div>
      <button class="logout" onclick="handleLogout()">Keluar</button>
    </div>

    <div class="dash-body">
      <!-- Stats -->
      <div class="stats">
        <div class="stat-card"><div class="num" id="totalRecipes">0</div><div class="label">Total Resep</div></div>
        <div class="stat-card"><div class="num" id="ratingAvg">0</div><div class="label">Rata-rata Rating</div></div>
        <div class="stat-card"><div class="num" id="totalCategories">0</div><div class="label">Kategori</div></div>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <div class="tab active" onclick="switchTab('recipes')">Daftar Resep</div>
        <div class="tab" onclick="switchTab('add')">Tambah Resep</div>
        <div class="tab" onclick="switchTab('data')">Data</div>
      </div>

      <!-- TAB: Recipes List -->
      <div class="tab-content active" id="tab-recipes">
        <table class="recipe-table">
          <thead><tr>
            <th>Foto</th><th>Nama</th><th>Kategori</th><th>Rating</th><th>Aksi</th>
          </tr></thead>
          <tbody id="recipeTableBody"></tbody>
        </table>
      </div>

      <!-- TAB: Add Recipe -->
      <div class="tab-content" id="tab-add">
        <form id="addForm" onsubmit="handleAddRecipe(event)">
          <div class="form-grid">
            <div class="form-group full"><label>Nama Resep</label><input type="text" id="fNama" required placeholder="Misal: Rendang Daging Sapi"></div>
            <div class="form-group"><label>Kategori</label>
              <select id="fKategori">
                <option value="makanan-berat">Makanan Berat</option>
                <option value="sup-soto">Sup & Soto</option>
                <option value="sate-panggang">Sate & Panggang</option>
                <option value="jajanan">Jajanan</option>
                <option value="minuman">Minuman</option>
              </select>
            </div>
            <div class="form-group"><label>Rating</label><input type="number" id="fRating" min="0" max="5" step="0.1" value="4.5"></div>
            <div class="form-group"><label>Waktu (menit)</label><input type="number" id="fWaktu" min="1" required placeholder="45"></div>
            <div class="form-group"><label>Porsi</label><input type="text" id="fPorsi" required placeholder="4 orang"></div>
            <div class="form-group"><label>Kesulitan</label>
              <select id="fKesulitan"><option>Mudah</option><option selected>Sedang</option><option>Sulit</option></select>
            </div>
            <div class="form-group full"><label>URL Foto (dari Unsplash/images.google)</label><input type="url" id="fGambar" placeholder="https://images.unsplash.com/photo-..."></div>
            <div class="form-group full"><label>Bahan-Bahan (satu per baris)</label><textarea id="fBahan" rows="5" required placeholder="500 gr daging sapi&#10;2 batang serai&#10;5 lembar daun jeruk"></textarea></div>
            <div class="form-group full"><label>Langkah Memasak (satu per baris)</label><textarea id="fLangkah" rows="6" required placeholder="Tumis bumbu halus hingga harum&#10;Masukkan daging, aduk rata&#10;Tuang santan"></textarea></div>
          </div>
          <button type="submit" class="btn-submit">💾 Simpan Resep</button>
        </form>
      </div>

      <!-- TAB: Data Management -->
      <div class="tab-content" id="tab-data">
        <p style="color:var(--muted);font-size:14px;margin-bottom:20px;">
          Export semua resep ke file JSON atau import resep dari file JSON.
        </p>
        <div class="data-actions">
          <button class="data-btn export" onclick="exportData()">📥 Export JSON</button>
          <button class="data-btn import" onclick="document.getElementById('importFile').click()">📤 Import JSON</button>
          <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
          <button class="data-btn import" onclick="resetToDefault()" style="border-color:rgba(239,68,68,0.3);color:var(--danger)">🔄 Reset ke Default</button>
        </div>
        <div id="importResult" style="font-size:13px;color:var(--success);margin-top:12px;display:none;"></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="../recipes-data.js"></script>
  <script>
    // ─── AUTH ───
    const ADMIN_USER = "samir";
    const ADMIN_PASS = "jamal";
    let isLoggedIn = localStorage.getItem("nusantaraeats_admin") === "true";

    function handleLogin() {
      const u = document.getElementById("username").value;
      const p = document.getElementById("password").value;
      if (u === ADMIN_USER && p === ADMIN_PASS) {
        localStorage.setItem("nusantaraeats_admin", "true");
        isLoggedIn = true;
        showDashboard();
      } else {
        document.getElementById("loginError").style.display = "block";
      }
    }

    function handleLogout() {
      localStorage.removeItem("nusantaraeats_admin");
      isLoggedIn = false;
      document.getElementById("dashboard").style.display = "none";
      document.getElementById("loginScreen").style.display = "block";
    }

    function showDashboard() {
      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("dashboard").style.display = "block";
      renderAdmin();
    }

    // ─── RECIPES DATA ───
    let adminRecipes = JSON.parse(localStorage.getItem("resepKitaRecipesV2")) || [];

    function saveAdmin() {
      localStorage.setItem("resepKitaRecipesV2", JSON.stringify(adminRecipes));
    }

    // ─── RENDER ───
    function renderAdmin() {
      // Stats
      document.getElementById("totalRecipes").textContent = adminRecipes.length;
      const avg = adminRecipes.length ? (adminRecipes.reduce((s, r) => s + (r.rating || 0), 0) / adminRecipes.length).toFixed(1) : "0";
      document.getElementById("ratingAvg").textContent = avg;
      const cats = new Set(adminRecipes.map(r => r.kategori));
      document.getElementById("totalCategories").textContent = cats.size;

      // Table
      const tbody = document.getElementById("recipeTableBody");
      tbody.innerHTML = adminRecipes.map(r => `
        <tr>
          <td><img src="${r.gambar}" class="preview-img" onerror="this.style.display='none'" loading="lazy"></td>
          <td><strong>${r.nama}</strong></td>
          <td>${r.kategori}</td>
          <td>${r.rating ? '★'.repeat(Math.floor(r.rating)) + '☆'.repeat(5-Math.floor(r.rating)) : '☆☆☆☆☆'}</td>
          <td><button class="del-btn" onclick="deleteRecipe(${r.id})">Hapus</button></td>
        </tr>
      `).join("");
    }

    // ─── CRUD ───
    function deleteRecipe(id) {
      if (!confirm("Hapus resep ini?")) return;
      adminRecipes = adminRecipes.filter(r => r.id !== id);
      saveAdmin();
      renderAdmin();
      showToast("✅ Resep dihapus");
    }

    function handleAddRecipe(e) {
      e.preventDefault();
      const nama = document.getElementById("fNama").value.trim();
      const kategori = document.getElementById("fKategori").value;
      const rating = parseFloat(document.getElementById("fRating").value) || 0;
      const waktu = parseInt(document.getElementById("fWaktu").value);
      const porsi = document.getElementById("fPorsi").value.trim();
      const kesulitan = document.getElementById("fKesulitan").value;
      const gambar = document.getElementById("fGambar").value.trim() || "https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=1200&q=80";
      const bahanRaw = document.getElementById("fBahan").value.trim();
      const langkahRaw = document.getElementById("fLangkah").value.trim();

      if (!nama || !waktu || !porsi || !bahanRaw || !langkahRaw) {
        showToast("⚠️ Isi semua field yang wajib");
        return;
      }

      const bahan = bahanRaw.split("\n").map(b => b.trim()).filter(b => b);
      const langkah = langkahRaw.split("\n").map(l => l.trim()).filter(l => l);

      const newRecipe = {
        id: Date.now(),
        nama,
        kategori,
        waktu,
        porsi,
        kesulitan,
        rating,
        gambar,
        bahan,
        langkah
      };

      adminRecipes.unshift(newRecipe);
      saveAdmin();
      renderAdmin();
      document.getElementById("addForm").reset();
      switchTab("recipes");
      showToast("✅ Resep berhasil ditambahkan!");
    }

    // ─── TABS ───
    function switchTab(name) {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
      document.querySelector(`.tab[onclick*="${name}"]`).classList.add("active");
      document.getElementById(`tab-${name}`).classList.add("active");
    }

    // ─── EXPORT / IMPORT ───
    function exportData() {
      const blob = new Blob([JSON.stringify(adminRecipes, null, 2)], {type: "application/json"});
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `nusantaraeats-recipes-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      showToast("✅ Data resep di-export");
    }

    function importData(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          if (!Array.isArray(data)) throw new Error("Format salah");
          adminRecipes = data;
          saveAdmin();
          renderAdmin();
          document.getElementById("importResult").textContent = `✅ Berhasil import ${data.length} resep`;
          document.getElementById("importResult").style.display = "block";
          showToast(`✅ ${data.length} resep di-import`);
        } catch(err) {
          showToast("❌ File JSON tidak valid");
        }
      };
      reader.readAsText(file);
      e.target.value = "";
    }

    function resetToDefault() {
      if (!confirm("Reset ke 10 resep default? Semua resep custom akan hilang.")) return;
      localStorage.removeItem("resepKitaRecipesV2");
      adminRecipes = JSON.parse(localStorage.getItem("resepKitaRecipesV2")) || [];
      renderAdmin();
      showToast("🔄 Reset ke resep default");
    }

    // ─── TOAST ───
    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      clearTimeout(t._t);
      t._t = setTimeout(() => t.classList.remove("show"), 2500);
    }

    // ─── INIT ───
    if (isLoggedIn) showDashboard();
    else document.getElementById("loginScreen").style.display = "block";

    // Enter key login
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !isLoggedIn) handleLogin();
    });
  </script>
</body>
</html>
